<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     div,button{
            width: 100%;
            height: 7vh;
            padding-top: 0.8em;
            padding-bottom: 0.8em;
            margin-top:0.8em ;
            border: 1px gold solid;
            border-radius: 50px;
            display:flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
        }
        </style>
</head>
<body>
    <div id="d1">Good Morning</div>
    <div id="d2">Good Afternoon</div>
    <div id="d3">Lucky Number</div>
    <button id="btn" style="display: none;">STOP</button>
    

    <script>
        //常規物件變數，物件的屬性的可變性
        const d1=document.getElementById('d1');
        const d2=document.getElementById('d2');
        const d3=document.getElementById('d3');
        const btn=document.getElementById('btn');

        /*
        事件
        1.直接HTML，標籤內調用
        2.物件.事件
        3.物件.監聽(傾聽)
        */
        d1.onclick=function(){
            window.alert("早安你好");
        }

        d1.onmouseover=function(){
            this.innerHTML="早安";
            this.style.cursor="pointer";
            setBg(this);
        }

        d1.onmouseout=function(){
            this.innerHTML="Good Morning";
            clearBg(this);
        }

        //物件.監聽

        d2.addEventListener('click',greeting);
        d2.addEventListener('mouseenter',function(){
            this.innerHTML="午安";
            this.style.cursor="pointer";
            setBg(this);
        })
        d2.addEventListener('mouseleave',function(){
            this.innerHTML="GOOD AFTERNOON";
            clearBg(this);
        })


        //
        d3.addEventListener('mouseover',function(){
            this.style.fontSize='5em';
            this.style.cursor="pointer";
            btn.style.display='block';
        })
       
        d3.addEventListener('mousemove',getNumber);
     
        btn.addEventListener('click',removeEL);


         //設定列的背景
        function setBg(obj){

            //透過JS 設定樣式CSS
            obj.style.backgroundColor='pink';
        }
        function clearBg(obj){
            obj.style.backgroundColor='transparent';
        }

        function greeting(){
            window.alert("扣你己挖!!");
        }

        //產生幸運號碼
        function getNumber(){
            let  num=Math.floor(Math.random()*49)+1;
            d3.innerHTML=num
        }

        //移除滑鼠移動mousemove的監聽
        function removeEL(){
            d3.removeEventListener('moudemove',getNumber);
            window.alert('停止產生幸運數字');
        }
    </script>
    
</body>
</html>
