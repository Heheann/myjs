<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Chartjs</title>
</head>
<body>
    <div style="width: 50%;">
        <canvas id="myChart"></canvas>
    </div>

    <script>  
        
        const data = {
        labels: ['一月','二月','三月','四月','五月','六月'],
        datasets: [{
            label: '上半年度銷售表',
            data: [12, 19, 3, -5, 2, 13],
            backgroundColor: [
            'rgba(255, 99, 132, 0.5)',
            'rgba(255, 159, 64, 0.5)',
            'rgba(255, 205, 86, 0.5)',
            'rgba(75, 192, 192, 0.5)',
            'rgba(54, 162, 235, 0.5)',
            'rgba(153, 102, 255, 0.5)'           
            ],
            borderColor: [
            'rgb(255, 99, 132)',
            'rgb(255, 159, 64)',
            'rgb(255, 205, 86)',
            'rgb(75, 192, 192)',
            'rgb(54, 162, 235)',
            'rgb(153, 102, 255)'           
            ],
            borderWidth: 3
        }]
        };

        const config = {
        type: 'line',
        data: data,
        options: {
            responsive:true,
           // indexAxis: 'y',
            plugins:{
                title:{
                    display:true,
                    text:"BSNET 上半年度銷售表"
                }
            },
            scales: {
            y: {
                beginAtZero: true
            }
            }
        },
        };

        //建立圖表
        const ctx=document.getElementById("myChart");
        const myChart=new Chart(ctx,config);
       
            </script>
</body>
</html>
