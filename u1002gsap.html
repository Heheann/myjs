<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>

     <link href="https://codepen.io/GreenSock/pen/xxmzBrw/fcaef74061bb7a76e5263dfc076c363e.css" rel="stylesheet" type="text/css">
    <title>GSAP</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: space-around;  /*設立元素之空白空間*/
            min-height: 100vh;
            flex-direction: column;
        }

        .green{
            background-image: url(images/arabica.png) !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
        }

        .purple{
            background-image: url(images/robusta.png) !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
        }

        .blue{
            background-image: url(images/liberia.png) !important;
            background-size: contain !important;
            background-repeat: no-repeat !important;
        }
    </style>
</head>
<body>
    <div class="box green"></div>
    <div class="box purple"></div>
    <div class="box blue"></div>

    <script>
        gsap.to(".green",{
            rotation:360,
            x:100,
            duration:1
        });

        gsap.from(".purple",{
            rotation:-360,
            x:-100,
            duration:1
        });

        gsap.fromTo(".blue",
            {x:100},
            {
            rotation:360,
            x:-100,
            duration:1
        });
    </script>
</body>
</html>
