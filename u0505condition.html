<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>猴子數來寶</title>
</head>
<body>
    
    <h1>猴子數來寶</h1>
    <hr>
    <button onclick="monkey()">猴子數來寶 </button>
    <p id="result"></p>

    <script>
        function monkey (){

            let d=new Date(); //宣告日期物件變數
            let w=d.getDay();
            let result=document.getElementById('result');
            let demo='';

            console.log(d);
            console.log(w);

            switch(w){
                case 1:
                    demo='今天星期一，猴子穿新衣。';
                    break; //跳離區塊
                case 2 :
                   demo='今天星期二，猴子肚子餓。';
                   break; //跳離區塊
                case 3 :
                   demo='今天星期三，猴子去爬山。';
                   break; //跳離區塊
                case 4 :
                   demo='今天星期四，猴子去考試。';
                   break; //跳離區塊
                case 5 :
                   demo='今天星期五，猴子去跳舞。';
                   break; //跳離區塊
                case 6 :
                   demo='今天星期六，猴子去斗六。';
                   break; //跳離區塊
                case 0 :
                   demo='今天星期日，猴子過生日。';
                   break; //跳離區塊


            }

            result.innerHTML=`今天是${d.toDateString()}<br>
            <img src ='images/monkey/monkey${w}'>
            `

        }


    </script>
</body>
</html>
