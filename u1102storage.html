<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show localStorage data </title>
</head>
<body>

    <h1>現在溫度與濕度</h1>
    <script>
        document.write("溫度：" +window.localStorage.getItem("t") + "<br>");
        document.write("濕度：" +window.localStorage.getItem("h") + "<br>");
    </script>
    
    
</body>
</html>
