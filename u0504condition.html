<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 表單系統</title>
</head>
<body>

    <h1>員工健康管理系統</h1>
    <hr>
    <input type="text" placeholder="姓名:" id="name" ><br>
    <input type="number" placeholder="身高:" id="h" ><br>
    <input type="number" placeholder="體重:" id="w" ><br>
    <input type="radio"  id="male" name="gender" checked >男
    <input type="radio"  id="female" name="gender"  >女<br>
    <button onclick="standard()">標準體重 </button>
    <button onclick="bmi()">身體質量指數 </button>
    <div id="result"></div>
    

    <script>

        function standard(){
            let name='';
            let h=0.0;
            let w=0.0;
            let gender='';
            let std=0.0; //標準體重
            let upper=0.0;  //體重上限
            let lower=0.0; //體重下限
            let warning=''; //警語

            name=document.getElementById('name').value;
            h=document.getElementById('h').value;
            w=document.getElementById('w').value;

            //判斷式
            //== 不判斷型別  ===判斷型別 用===較佳

            if(name===''||  h==0 || w==0){
                window.alert('請輸入姓名、身高和體重。');
                return;

            }

            if(document.getElementById('male').checked){
                gender='男';
                std=(h-80)*0.7;
            }else{
                gemder='女'
                std=(h-70)*0.6;
            }
            upper=std*1.1;
            lower=std*0.9;

            //多重條件的流程控制
            if(w>upper){
                warning='您該進行體重管理了'
            }else if(w<lower){
                warning='您太瘦了，請留意身體健康'
            }else{
                warning='恭喜您，您擁有健康的體重'

            }


            document.getElementById('result').innerHTML=`
                姓名:${name}<br>
                身高:${h}公分<br>
                體重:${w}公斤<br>
                性別:${gender}<br>
                標準體重:${std.toFixed(1)}公斤<br>
                體重上限:${upper.toFixed(1)}公斤<br>
                體重下限:${lower.toFixed(1)}公斤<br>
                溫馨提醒:${warning}<br>
            
            `;
        }

        //身體質量指數(bmi)

        function bmi(){
            let name=document.getElementById('name').value;
            let h=document.getElementById('h').value;
            let w=document.getElementById('w').value;
            let bmi =0.0;
            let warning=''

           bmi=w/Math.pow(h/100,2)

            if(name===''||  h==0 || w==0){
                window.alert('請輸入姓名、身高和體重。');
                return;

            }

            

             //多重條件的流程控制
            if(bmi<18.5){
                warning='過輕'
            }else if(bmi<24){
                warning='正常'
            }else if(bmi<27){
                warning='過重'
            }else if(bmi<30){
                warning='輕肥'
            }else if(bmi<35){
                warning='中肥'
            }else{
                warning='重肥'

            }



            document.getElementById('result').innerHTML=`
                姓名:${name}<br>
                身高:${h}公分<br>
                體重:${w}公斤<br>
                BMI:${bmi.toFixed(1)}<br>
                溫馨提醒:${warning}<br>
            
            `;
        }

        



    </script>
</body>
</html>
