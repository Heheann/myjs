<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas id="demo" width="500" height="600" style="border: 1px palegreen solid; "></canvas>

    <script>
        const demo=document.getElementById('demo');
        const ctx=demo.getContext('2d');
        
        //矩形
        ctx.fillStyle ='pink';
        ctx.fillRect(20,30,100,50);
        //線條
        ctx.beginPath();
        ctx.moveTo(0,400); //起
        ctx.lineTo(500,400);
        ctx.strokStyle='green';
        ctx.stroke();
        //圓形
        ctx.beginPath();
        ctx.arc(200,200,100,0,Math.PI*2);
        ctx.fillStyle ='pink';
        ctx.fill();
        //弧線
        ctx.beginPath();
        ctx.arc(340,200,100,Math.PI*2,true);
        ctx.strokStyle='tomato'
        ctx.stroke();
        //漸層色
        let g=ctx.createLinearGradient(0,0,100,0);
        g.addColorStop(0,'red');
        g.addColorStop(0.25,'yellow');
        g.addColorStop(1,'pink');
        ctx.fillStyle=g;
        ctx.fillRect(20,450,100,100);

    </script>
</body>
</html>
