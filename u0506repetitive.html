<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS and Loop (重複式的流程控制)</title>
</head>
<body>
    <h1>存錢桶</h1>
    <hr>
    <p>第1天存1元,第2天存2元,第3天存3元,....第10天存10元.</p>
    <img src="images/pig.png" onclick="pig()">
    <p id="result"></p>

    <script>

        function pig(){
            let sum=0;
            //r=document.getElementById('result');    //ok
            r=document.querySelector('#result');
            r.innerHTML='';

            for(let i=1;i<=10;i++){ //i++, i=i+1                
                r.innerHTML += `第 ${i} 天： ${sum} + ${i} = `;
                sum +=i;    //sum=sum+i;
                r.innerHTML +=sum + "<br>";
                //r.innerHTML= r.innerHTML +sum + "<br>";

            }
        }

    </script>
</body>
</html>
